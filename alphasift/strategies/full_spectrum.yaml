# -*- coding: utf-8 -*-
# AlphaSift 策略：全维度综合选股
# 基于用户提供的完整选股策略体系
# 包含：赛道分析 + 公司分析 + 买入条件 + 卖出条件 + 仓位管理

# === 已废弃：请使用 full_spectrum_v2.yaml ===
# full_spectrum v1 仅包含自然语言 ranking_hints，无机器可读的 V2 评分结构。
# full_spectrum_v2 是权威版本，覆盖全部34条策略规则并包含可执行的评分逻辑。

name: full_spectrum
display_name: 全维度综合选股
description: >
  基于赛道分析(政策/周期/供需/景气度) + 公司分析(壁垒/财务/管理层) +
  买入条件(基本面/技术面/资金面/估值面/情绪面) 的综合评分体系。
  符合越多条件，分数越高。
version: "1.0"
category: comprehensive
tags:
  - full_spectrum
  - multi_dimension
  - scoring

screening:
  enabled: false  # 已废弃，请使用 full_spectrum_v2
  market_scope: ["cn"]

  # ==================== 硬性过滤（不满足直接剔除）====================

  hard_filters:
    # --- 基础过滤 ---
    exclude_st: true                                    # 剔除 ST 股
    min_amount: 50000000                                # 日均成交额 >= 5000万（流动性）
    min_price: 2.0                                      # 最低价格

    # --- 估值过滤（规则4: 价值股筛选）---
    pe_ttm_min: 0                                       # PE > 0（排除亏损股）
    pe_ttm_max: 100                                     # PE < 100（排除极端高估值）
    pb_min: 0                                           # PB > 0

    # --- 市值过滤 ---
    market_cap_min: 5000000000                          # 市值 >= 50亿（排除小盘壳股）

  # ==================== 评分权重（赛道 + 公司 + 买入条件）====================

  # 赛道分析权重
  sector_weight: 0.25

  # 公司分析权重
  company_weight: 0.25

  # 买入条件权重
  buy_signal_weight: 0.30

  # 技术面权重
  tech_weight: 0.20

  # 因子权重
  factor_weights:
    value: 0.20           # 估值因子
    growth: 0.20          # 成长因子
    quality: 0.20         # 质量因子
    momentum: 0.15        # 动量因子
    stability: 0.10       # 稳定性因子
    liquidity: 0.10       # 流动性因子
    size: 0.05            # 规模因子

  max_output: 20

  # ==================== 评分规则说明 ====================
  ranking_hints: |
    【赛道分析维度】
    1. 政策导向: 政策扶持赛道加分，限制/淘汰赛道减分
    2. 行业周期: 成长期赛道加分，衰退期赛道减分
    3. 供需关系: 供给短缺赛道加分，产能过剩赛道减分
    4. 景气度: 营收/利润增速上行加分

    【公司分析维度】
    1. 竞争壁垒: 核心技术/专利/品牌护城河加分
    2. 财务健康度: 毛利率/现金流/负债率达标加分
    3. 管理层能力: 业绩兑现度高加分

    【选股规则】
    规则1: 优先政策扶持赛道，剔除政策限制赛道
    规则2: 景气度指标连续2季度环比提升，行业排名前30%
    规则3: 核心壁垒（专利/市占率/品牌）
    规则4: 财务指标（毛利率/现金流/负债率）
    规则5: 剔除衰退期且市占率下滑标的

    【买入条件】
    条件1: 连续2季度净利润环比增速>=30%，营收增速>=20%，毛利率回升
    条件2: 股价突破年线，3日内成交量放大>=50%，换手率3%-8%
    条件3: 北向资金连续5日净买入，累计占流通市值>=0.5%
    条件4: 重大订单/技术突破，赛道处于景气周期
    条件5: PE低于行业均值30%，PEG<1，分红率>=3%
    条件6: 大盘回调时抗跌（跌幅<大盘50%），反弹时领涨

    【卖出条件】
    1. 净利润增速<0且毛利率环比下滑>=5%
    2. 股价跌破20日均线且成交量放大
    3. MACD死叉
    4. 达到止盈价（+30%）或止损价（-10%）
    5. 主力资金连续3日净流出

    【指标操作】
    PE > 行业均值100%: 减仓50%
    PE < 行业均值30% 且 PEG<1: 加仓20%
    MACD金叉且红柱放大: 首次建仓30%
    MACD死叉且绿柱放大: 减仓50%
    换手率 > 15%: 清仓30%
    北向资金单日净买入 >= 0.5%流通市值: 加仓10%

    【仓位管理】
    单一个股仓位 <= 20%
    单一赛道仓位 <= 40%
    现金仓位 >= 10%

    【风险规避】
    剔除: ST股、退市风险股、连续3年亏损股
    规避: 日均成交额 < 5000万的标的
